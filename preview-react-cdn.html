      function parseAPIResponseText(text) {
        const trimmed = String(text || "").trim();
        if (!trimmed) return null;
        const jsonStart = trimmed.search(/[\[{]/);
        if (jsonStart === -1) return { error: trimmed };
        try {
          return JSON.parse(trimmed.slice(jsonStart));
        } catch {
          return { error: trimmed };
        }

      function InviteAccept({ navigate }) {
        const params = currentHashParams();
        const token = params.get("token") || "";
        const invitationId = params.get("id") || "";

        const [loading, setLoading] = React.useState(true);
        const [saving, setSaving] = React.useState(false);

        React.useEffect(() => {
          const endpoint = token ? `${API_BASE_URL}/api/company-invitations/by-token?token=${encodeURIComponent(token)}` : invitationId ? `${API_BASE_URL}/api/company-invitations/${encodeURIComponent(invitationId)}` : "";

            setLoading(false);
            setMessage({ type: "error", text: "Link do convite invalido. Solicite um novo link ao administrador." });
            return;

          fetch(endpoint)
            .then((response) => {
              if (!response.ok) throw new Error("Nao foi possivel carregar o convite.");
              return response.text();
            })

              const data = parseAPIResponseText(text);

              setForm((current) => ({ ...current, state: data.state || "", adminFullName: data.contactName || "", adminEmail: data.email || "", adminPhone: data.phone || "" }));

            .finally(() => setLoading(false));
        }, [token, invitationId]);

        const submitAccept = async (event) => {
          event.preventDefault();
          setMessage(null);
          if (form.password.length < 8) {
            setMessage({ type: "error", text: "A senha deve ter pelo menos 8 caracteres." });
            return;
          }

          setSaving(true);

              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ token, invitationId: invitationId || invitation?.id || "", website: form.website, institutionalDescription: form.institutionalDescription, city: form.city, state: form.state, adminFullName: form.adminFullName, adminEmail: form.adminEmail, adminPhone: form.adminPhone, adminJobTitle: form.adminJobTitle, password: form.password })
            });
            const data = parseAPIResponseText(await response.text());
            if (!response.ok || data?.error) throw new Error(data?.error || "Nao foi possivel aceitar o convite.");
            setMessage({ type: "success", text: "Cadastro enviado com sucesso. A empresa agora ficou aguardando analise da LicitaHub." });
          } catch (error) {
            setMessage({ type: "error", text: error.message || "Nao foi possivel concluir o aceite do convite." });
          } finally {
            setSaving(false);
          }
        };

        return (
          <Page label="Convite" title="Aceite do convite">
            {message && <Card className={`formFeedback ${message.type === "success" ? "success" : "dangerNotice"}`}><p>{message.text}</p></Card>}
            {loading && <Card className="formFeedback"><p>Carregando convite...</p></Card>}

                <FormGrid>
                  <Field label="Nome fantasia"><input value={invitation.tradeName || ""} readOnly /></Field>
                  <Field label="CNPJ"><input value={invitation.cnpj || ""} readOnly /></Field>

          const file = event.target.files?.[0];
          if (!file) {
            setImagePreview("");

            return;

          const allowedTypes = ["image/png", "image/jpeg", "image/gif", "image/webp"];

            setMessage({ type: "error", text: "Use uma imagem PNG, JPG, GIF ou WebP." });

            event.target.value = "";
            return;
          }

          const reader = new FileReader();
          reader.onload = () => {
            const dataUrl = String(reader.result || "");
            setImagePreview(dataUrl);
            setForm((current) => ({
              ...current,
              mainImageDataUrl: dataUrl,
              mainImageFileName: file.name,
              mainImageMimeType: file.type
            }));

          reader.readAsDataURL(file);

              status: "draft",
              summary: "",
              content: "",
              mainImageUrl: "",
              mainImageDataUrl: "",
              mainImageFileName: "",
              mainImageMimeType: ""
