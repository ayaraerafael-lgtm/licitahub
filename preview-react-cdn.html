<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LicitaHub - Preview React</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
      const roles = {
        platformAdmin: "Administrador da plataforma",
        companyAdmin: "Administrador da empresa",
        commercial: "Comercial / Relacionamento",
        technical: "Técnico",
        reader: "Leitor"
      };

      const modules = [
        {
          label: "Acesso e administração",
          roles: ["platformAdmin"],
          items: [
            ["admin-dashboard", "Painel administrativo"],
            ["invite-new", "Novo convite"],
            ["invite-list", "Lista de convites"],
            ["company-review", "Análise de empresas"]
          ]
        },
        {
          label: "Empresa",
          roles: ["companyAdmin", "commercial", "technical", "reader"],
          items: [
            ["company-dashboard", "Dashboard"],
            ["company-profile-edit", "Editar perfil"],
            ["company-users", "Usuários vinculados", ["companyAdmin"]],
            ["company-user-profile", "Cadastro de usuário", ["companyAdmin"]],
            ["company-user-block", "Confirmar bloqueio", ["companyAdmin"], true],
            ["company-user-unblock", "Confirmar desbloqueio", ["companyAdmin"], true],
            ["company-user-delete", "Confirmar remoção", ["companyAdmin"], true]
          ]
        },
        {
          label: "Comunidade",
          roles: ["companyAdmin", "commercial", "technical", "reader"],
          items: [
            ["community-home", "Comunidade"],
            ["company-public-profile", "Perfil público"],
            ["publication-new", "Criar publicação", ["companyAdmin", "commercial"]],
            ["publication-list", "Minhas publicações", ["companyAdmin", "commercial"]]
          ]
        },
        {
          label: "Editais",
          roles: ["platformAdmin", "companyAdmin", "commercial", "technical", "reader"],
          items: [
            ["tender-admin", "Admin editais", ["platformAdmin"]],
            ["tender-new", "Cadastro de edital", ["platformAdmin"]],
            ["tender-list", "Lista de editais", ["companyAdmin", "commercial", "technical", "reader"]],
            ["tender-detail", "Detalhe do edital", ["companyAdmin", "commercial", "technical", "reader"]],
            ["tender-interest", "Interesse no edital", ["companyAdmin", "commercial"]],
            ["tender-interest-list", "Empresas interessadas", ["companyAdmin", "commercial"]]
          ]
        },
        {
          label: "Radar LicitaHub",
          roles: ["platformAdmin", "companyAdmin", "commercial", "technical", "reader"],
          items: [
            ["radar-home", "Notícias"],
            ["radar-detail", "Detalhe da notícia"],
            ["radar-new", "Cadastrar notícia", ["platformAdmin"]]
          ]
        },
        {
          label: "Match e consórcios",
          roles: ["companyAdmin", "commercial"],
          items: [
            ["match-partners", "Vitrine de parceiros"],
            ["match-tinder", "Avaliar candidata"],
            ["match-profile", "Detalhe do anúncio"],
            ["match-success", "Match realizado"]
          ]
        }
      ];

      const canSee = (item, role) => !item[2] || item[2].includes(role);
      const isHidden = (item) => item[3] === true;
      const firstScreenFor = (role) => modules.find((m) => m.roles.includes(role))?.items.find((i) => canSee(i, role) && !isHidden(i))?.[0] || "company-dashboard";
      const NavigationContext = React.createContext({ canGoBack: false, goBack: () => {} });
      const tenders = [
        { id: "cp-004-2026", agency: "Prefeitura Municipal", number: "CP 004/2026", modality: "Concorrência", object: "Projetos de saneamento e drenagem", location: "MG", opening: "18/08/2026", value: "R$ 2.400.000,00", criterion: "Técnica e preço", status: "Publicado" },
        { id: "tp-012-2026", agency: "Departamento de Estradas", number: "TP 012/2026", modality: "Tomada de preços", object: "Supervisão de obras rodoviárias", location: "PR", opening: "02/09/2026", value: "R$ 5.800.000,00", criterion: "Menor preço", status: "Em avaliação" }
      ];

      function App() {
        const [role, setRole] = React.useState("companyAdmin");
        const [screen, setScreen] = React.useState(firstScreenFor("companyAdmin"));
        const [menuCollapsed, setMenuCollapsed] = React.useState(false);
        const sidebarRef = React.useRef(null);
        const [userStatuses, setUserStatuses] = React.useState({ marina: "Ativo", renato: "Ativo", paula: "Convite pendente" });
        const [selectedUserAction, setSelectedUserAction] = React.useState({ id: "paula", name: "Paula Martins", action: "remove" });
        const [selectedUserProfile, setSelectedUserProfile] = React.useState({ mode: "create", user: null });
        const [selectedPublicationId, setSelectedPublicationId] = React.useState(null);
        const [selectedTenderId, setSelectedTenderId] = React.useState("cp-004-2026");
        const [navigationStack, setNavigationStack] = React.useState([]);

        const navigateTo = (id) => {
          if (id === screen) return;
          setNavigationStack((current) => [...current, screen]);
          setScreen(id);
        };

        const goBack = () => {
          setNavigationStack((current) => {
            const previous = current[current.length - 1];
            if (previous) {
              setScreen(previous);
              return current.slice(0, -1);
            }
            setScreen(firstScreenFor(role));
            return [];
          });
        };

        const openUserProfile = (user = null, mode = "create") => {
          setSelectedUserProfile({ mode, user });
          navigateTo("company-user-profile");
        };

        const openUserAction = (id, name, action) => {
          setSelectedUserAction({ id, name, action });
          navigateTo(action === "block" ? "company-user-block" : action === "unblock" ? "company-user-unblock" : "company-user-delete");
        };

        const updateUserStatus = (id, status) => {
          setUserStatuses((current) => ({ ...current, [id]: status }));
          navigateTo("company-users");
        };

        const openPublicationManager = (publicationId) => {
          setSelectedPublicationId(publicationId);
          navigateTo("publication-list");
        };

        const openTenderInterestCompanies = (tenderId) => {
          setSelectedTenderId(tenderId);
          navigateTo("tender-interest-list");
        };

        React.useEffect(() => {
          const closeMenuOnOutsideClick = (event) => {
            if (menuCollapsed || sidebarRef.current?.contains(event.target)) return;
            setMenuCollapsed(true);
          };

          document.addEventListener("pointerdown", closeMenuOnOutsideClick);
          return () => document.removeEventListener("pointerdown", closeMenuOnOutsideClick);
        }, [menuCollapsed]);

        React.useEffect(() => {
          const allowed = modules.some((m) => m.roles.includes(role) && m.items.some((i) => i[0] === screen && canSee(i, role)));
          if (!allowed) setScreen(firstScreenFor(role));
        }, [role, screen]);

        return (
          <div className={`app ${menuCollapsed ? "menuCollapsed" : ""}`}>
            <aside className="sidebar" ref={sidebarRef}>
              <div className="brand">
                <span className="brandMark">LH</span>
                <div><strong>LicitaHub</strong><small>Rede consultiva</small></div>
              </div>

              <button className="menuToggle" onClick={() => setMenuCollapsed(!menuCollapsed)}>
                {menuCollapsed ? "Expandir menu" : "Recolher menu"}
              </button>

              <label className="roleSwitch">
                Visualizar como
                <select value={role} onChange={(event) => setRole(event.target.value)}>
                  {Object.entries(roles).map(([value, label]) => <option key={value} value={value}>{label}</option>)}
                </select>
              </label>

              <nav>
                {modules.filter((m) => m.roles.includes(role)).map((group) => (
                  <div className="navGroup" key={group.label}>
                    <span>{group.label}</span>
                    {group.items.filter((item) => canSee(item, role) && !isHidden(item)).map((item) => (
                      <a href="#" className={screen === item[0] ? "active" : ""} onClick={(event) => { event.preventDefault(); navigateTo(item[0]); }} key={item[0]}>
                        {item[1]}
                      </a>
                    ))}
                  </div>
                ))}
              </nav>
            </aside>

            <main className="main">
              <NavigationContext.Provider value={{ canGoBack: navigationStack.length > 0, goBack }}>
                <Topbar navigate={navigateTo} openPublicationManager={openPublicationManager} openTenderInterestCompanies={openTenderInterestCompanies} />
                <Screen screen={screen} navigate={navigateTo} userStatuses={userStatuses} openUserAction={openUserAction} selectedUserAction={selectedUserAction} updateUserStatus={updateUserStatus} selectedUserProfile={selectedUserProfile} openUserProfile={openUserProfile} selectedPublicationId={selectedPublicationId} openPublicationManager={openPublicationManager} selectedTenderId={selectedTenderId} openTenderInterestCompanies={openTenderInterestCompanies} />
                <ScrollControls />
              </NavigationContext.Provider>
            </main>
          </div>
        );
      }

      function Topbar({ navigate, openPublicationManager, openTenderInterestCompanies }) {
        const [alertsOpen, setAlertsOpen] = React.useState(false);
        const alerts = [
          { title: "Novo comentário", text: "GeoArq comentou em Nova equipe de saneamento.", action: () => openPublicationManager("pub-saneamento") },
          { title: "Nova curtida", text: "Plano Sul curtiu sua publicação técnica.", action: () => openPublicationManager("pub-seminario") },
          { title: "Match realizado", text: "GeoArq Projetos também demonstrou interesse.", action: () => navigate("match-success") },
          { title: "Empresa interessada", text: "Há empresas avaliando a CP 004/2026.", action: () => openTenderInterestCompanies("cp-004-2026") }
        ];
        const openAlert = (alert) => {
          alert.action();
          setAlertsOpen(false);
        };
        return (
          <header className="topbar">
            <div className="companyTopIdentity">
              <LogoSlot initials="EC" size="sm" label="Logo da Engenvale Consultoria" />
              <div><span className="eyebrow">Engenvale Consultoria</span><h1>LicitaHub</h1></div>
            </div>
            <div className="alertCenter">
              <button className="alertBell" type="button" title="Ver alertas importantes" aria-label="Ver alertas importantes" onClick={() => setAlertsOpen((open) => !open)}><span>{"\uD83D\uDD14"}</span><strong>{alerts.length}</strong></button>
              {alertsOpen && (
                <div className="alertDropdown">
                  <div className="alertDropdownHeader"><strong>Alertas importantes</strong><span>{alerts.length} novos</span></div>
                  {alerts.map((alert) => <button type="button" className="alertItem" key={alert.title} onClick={() => openAlert(alert)}><strong>{alert.title}</strong><span>{alert.text}</span></button>)}
                </div>
              )}
            </div>
          </header>
        );
      }

      function ScrollControls() {
        const { canGoBack, goBack } = React.useContext(NavigationContext);
        const scrollToTop = () => window.scrollTo({ top: 0, behavior: "smooth" });
        const scrollToBottom = () => window.scrollTo({ top: document.documentElement.scrollHeight, behavior: "smooth" });
        return (
          <div className="scrollControls" aria-label="Navegação rápida da página">
            <button type="button" title="Subir para o topo" aria-label="Subir para o topo" onClick={scrollToTop}>{"\u2191"}</button>
            <button type="button" title="Voltar para tela anterior" aria-label="Voltar para tela anterior" disabled={!canGoBack} onClick={goBack}>{"\u2190"}</button>
            <button type="button" title="Descer para o final" aria-label="Descer para o final" onClick={scrollToBottom}>{"\u2193"}</button>
          </div>
        );
      }

      function Page({ label, title, children, actions }) {
        return (
          <section className="page">
            <div className="pageHeader">
              <div><span className="eyebrow">{label}</span><h2>{title}</h2><p className="pageHelp">{getPageHelp(title)}</p></div>
              {actions && <div className="actions">{actions}</div>}
            </div>
            {children}
          </section>
        );
      }

      function getPageHelp(title) {
        const help = {
          "Painel administrativo": "Acompanhe convites, empresas pendentes, editais e pontos que exigem ação da plataforma.",
          "Novo convite de empresa": "Cadastre a empresa que será convidada. CNPJ e nome fantasia identificam a empresa de forma única.",
          "Lista de convites": "Veja o andamento dos convites enviados, identifique pendências e acompanhe quem já iniciou cadastro.",
          "Análise de empresa": "Revise os dados enviados pela empresa e decida se ela entra, ajusta informações ou será recusada.",
          "Dashboard da empresa": "Resumo operacional da empresa: oportunidades, matches, comunidade e próximos passos em um só lugar.",
          "Editar perfil da empresa": "Mantenha a vitrine institucional atualizada. Essas informações aparecem na comunidade e no match.",
          "Usuários vinculados": "Gerencie quem opera pela empresa. O perfil de acesso define as permissões de cada pessoa.",
          "Cadastro do usuário vinculado": "Inclua ou edite uma pessoa da empresa, escolhendo o perfil adequado para sua função.",
          "Cadastrar usuário vinculado": "Inclua uma nova pessoa da empresa e envie o convite de acesso.",
          "Editar usuário vinculado": "Atualize os dados, cargo e perfil de acesso de uma pessoa já vinculada à empresa.",
          "Confirmar bloqueio de usuário": "Suspenda temporariamente o acesso da pessoa sem remover seu vínculo ou histórico.",
          "Confirmar desbloqueio de usuário": "Reative o acesso de uma pessoa bloqueada para que ela volte a operar pela empresa.",
          "Confirmar remoção de usuário": "Confirme a desativação do acesso sem apagar histórico, auditoria ou registros anteriores.",
          "Rede de empresas": "Acompanhe publicações, encontre empresas por tema e fortaleça a presença institucional da sua empresa.",
          "Perfil público da empresa": "Veja como a empresa aparece para a comunidade: identidade, destaques, categorias e publicações.",
          "Criar publicação": "Publique fotos, notícias, eventos, conquistas ou conteúdo técnico no perfil e na comunidade.",
          "Minhas publicações": "Gerencie o conteúdo publicado pela empresa e acompanhe o que está em rascunho ou visível.",
          "Notícias e inteligência de mercado": "Conteúdo publicado pela LicitaHub para orientar empresas sobre mercado, editais e tendências.",
          "Detalhe da notícia": "Leitura completa da notícia, com contexto e orientações úteis para a comunidade.",
          "Cadastrar notícia": "Área do administrador para publicar comunicados, notícias e análises da plataforma.",
          "Painel administrativo de editais": "Controle os editais cadastrados, seus status e oportunidades que já geraram interesse.",
          "Cadastro de edital": "Registre a oportunidade e organize os dados principais para que empresas possam avaliar com clareza.",
          "Lista de editais": "Encontre oportunidades, marque interesse e abra o detalhe completo de cada edital.",
          "Detalhe do edital": "Entenda a oportunidade, veja exigências e acesse a ficha técnica antes de decidir participar.",
          "Manifestação de interesse": "Registre a posição da empresa e indique se deseja buscar parceiros para esta licitação.",
          "Empresas interessadas no edital": "Veja empresas que também demonstraram interesse e escolha quais avaliar como possíveis parceiras.",
          "Vitrine de parceiros": "Veja anúncios de empresas interessadas na licitação e abra os detalhes para avaliar complementaridade.",
          "Avaliar candidata da licitação": "Avalie uma empresa por vez: veja o que ela oferece, o que falta e decida recusar ou dar match.",
          "Detalhe do anúncio": "Visão detalhada da empresa dentro da licitação, com oferta, necessidades e aderência.",
          "Match realizado": "Confirmação de interesse recíproco entre empresas na mesma licitação, com contato direto pelo WhatsApp."
        };
        return help[title] || "Tela da LicitaHub para apoiar decisões empresariais com clareza e contexto.";
      }

      function Button({ children, variant = "primary", onClick }) {
        return <button className={`btn ${variant}`} onClick={onClick}>{children}</button>;
      }

      function Card({ children, className = "", onClick, id }) {
        return <div className={`card ${className}`} onClick={onClick} id={id}>{children}</div>;
      }

      function Field({ label, hint, children }) {
        return <label className="field"><span>{label}</span>{children}{hint && <small>{hint}</small>}</label>;
      }

      function LogoSlot({ initials = "EC", size = "md", label = "Logo da empresa", src = "" }) {
        return <span className={`logoSlot logoSlot-${size}`} title={label} aria-label={label}>{src ? <img src={src} alt={label} /> : <span>{initials}</span>}</span>;
      }

      function ImageUploadField({ label, hint, accept = "image/*", initials = "IMG", variant = "mini", previewLabel }) {
        const [preview, setPreview] = React.useState("");
        const [fileName, setFileName] = React.useState("");
        const handleChange = (event) => {
          const file = event.target.files?.[0];
          if (!file) {
            setPreview("");
            setFileName("");
            return;
          }
          setFileName(file.name);
          setPreview(URL.createObjectURL(file));
        };
        return (
          <Field label={label} hint={hint}>
            <div className={`imageUploadField ${variant === "hero" ? "imageUploadHero" : ""}`}>
              <div className={variant === "hero" ? "imageHeroPreview" : "imageMiniPreview"}>{preview ? <img src={preview} alt="Prévia da imagem selecionada" /> : <span>{initials}</span>}{variant === "hero" && <small>{previewLabel || "Identidade visual"}</small>}</div>
              <div><input type="file" accept={accept} onChange={handleChange} /><small>{fileName || "Nenhuma imagem selecionada"}</small></div>
            </div>
          </Field>
        );
      }

      function FormGrid({ children }) {
        return <div className="formGrid">{children}</div>;
      }

      function Stats({ items }) {
        return <div className="stats">{items.map(([label, value]) => <Card className="stat" key={label}><strong>{value}</strong><span>{label}</span></Card>)}</div>;
      }

      function Table({ columns, rows }) {
        return (
          <div className="tableWrap">
            <table>
              <thead><tr>{columns.map((column) => <th key={column}>{column}</th>)}</tr></thead>
              <tbody>{rows.map((row, index) => <tr key={index}>{row.map((cell, i) => <td key={i}>{cell}</td>)}</tr>)}</tbody>
            </table>
          </div>
        );
      }

      function Screen({ screen, navigate, userStatuses, openUserAction, selectedUserAction, updateUserStatus, selectedUserProfile, openUserProfile, selectedPublicationId, openPublicationManager, selectedTenderId, openTenderInterestCompanies }) {
        const map = {
          "admin-dashboard": <AdminDashboard />,
          "invite-new": <InviteNew />,
          "invite-list": <InviteList />,
          "company-review": <CompanyReview />,
          "company-dashboard": <CompanyDashboard navigate={navigate} />,
          "company-profile-edit": <CompanyProfileEdit />,
          "company-users": <CompanyUsers navigate={navigate} userStatuses={userStatuses} openUserAction={openUserAction} openUserProfile={openUserProfile} />,
          "company-user-profile": <CompanyUserProfile selectedUserProfile={selectedUserProfile} />,
          "company-user-block": <CompanyUserAccessConfirm navigate={navigate} selectedUserAction={selectedUserAction} updateUserStatus={updateUserStatus} mode="block" />,
          "company-user-unblock": <CompanyUserAccessConfirm navigate={navigate} selectedUserAction={selectedUserAction} updateUserStatus={updateUserStatus} mode="unblock" />,
          "company-user-delete": <CompanyUserDelete navigate={navigate} selectedUserAction={selectedUserAction} />,
          "community-home": <CommunityHome />,
          "company-public-profile": <CompanyPublicProfile navigate={navigate} openPublicationManager={openPublicationManager} />,
          "publication-new": <PublicationNew />,
          "publication-list": <PublicationList selectedPublicationId={selectedPublicationId} />,
          "radar-home": <RadarHome navigate={navigate} />,
          "radar-detail": <RadarDetail />,
          "radar-new": <RadarNew />,
          "tender-admin": <TenderAdmin />,
          "tender-new": <TenderNew />,
          "tender-list": <TenderList navigate={navigate} openTenderInterestCompanies={openTenderInterestCompanies} />,
          "tender-detail": <TenderDetail navigate={navigate} />,
          "tender-interest": <TenderInterest navigate={navigate} />,
          "tender-interest-list": <TenderInterestList navigate={navigate} selectedTenderId={selectedTenderId} />,
          "match-partners": <MatchPartners navigate={navigate} />,
          "match-tinder": <MatchTinder navigate={navigate} />,
          "match-profile": <MatchProfile navigate={navigate} />,
          "match-success": <MatchSuccess />
        };
        return map[screen] || <CompanyDashboard />;
      }

      function AdminDashboard() {
        return <Page label="Administração" title="Painel administrativo"><Stats items={[["Convites", "12"], ["Empresas pendentes", "4"], ["Empresas ativas", "28"], ["Editais abertos", "9"]]} /><div className="grid two"><Card><h3>Entrada de empresas</h3><p>Convites, aprovações e bloqueios.</p><Button>Novo convite</Button></Card><Card><h3>Editais</h3><p>Cadastro e acompanhamento das oportunidades.</p><Button variant="secondary">Cadastrar edital</Button></Card></div></Page>;
      }

      function InviteNew() {
        return <Page label="Convites" title="Novo convite de empresa" actions={<Button>Enviar convite</Button>}><FormGrid><Field label="Nome fantasia" hint="Obrigatório. Único."><input placeholder="Engenvale Consultoria" /></Field><Field label="CNPJ" hint="Obrigatório. Único."><input placeholder="00.000.000/0000-00" /></Field><Field label="Contato principal"><input placeholder="Nome completo" /></Field><Field label="E-mail" hint="Pode repetir."><input type="email" placeholder="contato@empresa.com.br" /></Field><Field label="Telefone"><input placeholder="(00) 00000-0000" /></Field><Field label="Estado"><select><option>Selecione</option><option>SP</option><option>MG</option></select></Field></FormGrid><Field label="Observação interna"><textarea placeholder="Visível apenas para administradores" /></Field></Page>;
      }

      function InviteList() {
        return <Page label="Convites" title="Lista de convites" actions={<Button>Novo convite</Button>}><Table columns={["Empresa", "CNPJ", "Contato", "E-mail", "Status"]} rows={[["Engenvale Consultoria", "12.345.678/0001-90", "Marina Costa", "marina@engenvale.com.br", "Enviado"], ["Plano Sul Engenharia", "22.222.222/0001-22", "Carlos Lima", "contato@planosul.com.br", "Aguardando aprovação"]]} /></Page>;
      }

      function CompanyReview() {
        return <Page label="Administração" title="Análise de empresa"><FormGrid><Field label="Empresa"><input value="Plano Sul Engenharia" readOnly /></Field><Field label="CNPJ"><input value="22.222.222/0001-22" readOnly /></Field><Field label="Status"><input value="Aguardando aprovação" readOnly /></Field></FormGrid><Field label="Ajuste solicitado"><textarea placeholder="Informe o que precisa ser corrigido" /></Field><div className="actions"><Button>Aprovar</Button><Button variant="secondary">Solicitar ajuste</Button><Button variant="danger">Recusar</Button></div></Page>;
      }

      function CompanyDashboard({ navigate }) {
        return (
          <Page label="Empresa" title="Dashboard da empresa" actions={<Button onClick={() => navigate("company-profile-edit")}>Atualizar perfil</Button>}>
            <div className="dashboardHero">
              <div>
                <span className="eyebrow">Engenvale Consultoria</span>
                <h3>Boa tarde, Marina. Há 3 oportunidades com alta aderência e 2 conversas de parceria aguardando avanço.</h3>
                <p>Use esta visão para priorizar editais, acompanhar matches e manter a presença da empresa ativa na comunidade.</p>
              </div>
              <div className="profileScore">
                <strong>82%</strong>
                <span>perfil completo</span>
                <div className="progress"><i style={{width: "82%"}}></i></div>
              </div>
            </div>

            <Stats items={[["Editais compatíveis", "9"], ["Alta prioridade", "3"], ["Matches abertos", "2"], ["Publicações recentes", "14"]]} />

            <div className="dashboardGrid">
              <Card>
                <div className="cardHeader">
                  <h3>Oportunidades prioritárias</h3>
                  <span className="badge">Editais</span>
                </div>
                <div className="priorityList">
                  <PriorityItem title="CP 004/2026 - Projetos de saneamento" meta="MG | R$ 2,4 mi | abertura em 20/08/2026" score="Alta aderência" />
                  <PriorityItem title="TP 012/2026 - Supervisão rodoviária" meta="PR | R$ 5,8 mi | em avaliação" score="Média aderência" />
                  <PriorityItem title="Chamamento técnico socioambiental" meta="BA | valor não informado | novo" score="Complementar" />
                </div>
              </Card>

              <Card>
                <div className="cardHeader">
                  <h3>Matches e conversas</h3>
                  <span className="badge">Consórcios</span>
                </div>
                <div className="priorityList">
