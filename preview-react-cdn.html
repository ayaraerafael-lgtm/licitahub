<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LicitaHub - Preview React</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
      const roles = {
        platformAdmin: "Administrador da plataforma",
        companyAdmin: "Administrador da empresa",
        commercial: "Comercial / Relacionamento",
        technical: "Técnico",
        reader: "Leitor"
      };

      const modules = [
        {
          label: "Acesso e administração",
          roles: ["platformAdmin"],
          items: [
            ["admin-dashboard", "Painel administrativo"],
            ["invite-new", "Novo convite"],
            ["invite-list", "Lista de convites"],
            ["company-review", "Análise de empresas"]
          ]
        },
        {
          label: "Empresa",
          roles: ["companyAdmin", "commercial", "technical", "reader"],
          items: [
            ["company-dashboard", "Dashboard"],
            ["company-profile-edit", "Editar perfil"],
            ["company-users", "Usuários vinculados", ["companyAdmin"]],
            ["company-user-profile", "Cadastro de usuário", ["companyAdmin"]]
          ]
        },
        {
          label: "Comunidade",
          roles: ["companyAdmin", "commercial", "technical", "reader"],
          items: [
            ["community-home", "Comunidade"],
            ["company-public-profile", "Perfil público"],
            ["publication-new", "Criar publicação", ["companyAdmin", "commercial"]],
            ["publication-list", "Minhas publicações", ["companyAdmin", "commercial"]]
          ]
        },
        {
          label: "Editais",
          roles: ["platformAdmin", "companyAdmin", "commercial", "technical", "reader"],
          items: [
            ["tender-admin", "Admin editais", ["platformAdmin"]],
            ["tender-new", "Cadastro de edital", ["platformAdmin"]],
            ["tender-list", "Lista de editais", ["companyAdmin", "commercial", "technical", "reader"]],
            ["tender-detail", "Detalhe do edital", ["companyAdmin", "commercial", "technical", "reader"]],
            ["tender-interest", "Interesse no edital", ["companyAdmin", "commercial"]],
            ["tender-interest-list", "Empresas interessadas", ["companyAdmin", "commercial"]]
          ]
        },
        {
          label: "Radar LicitaHub",
          roles: ["platformAdmin", "companyAdmin", "commercial", "technical", "reader"],
          items: [
            ["radar-home", "Notícias"],
            ["radar-detail", "Detalhe da notícia"],
            ["radar-new", "Cadastrar notícia", ["platformAdmin"]]
          ]
        },
        {
          label: "Match e consórcios",
          roles: ["companyAdmin", "commercial"],
          items: [
            ["match-partners", "Match de parceiros"],
            ["match-tinder", "Avaliar candidata"],
            ["match-profile", "Perfil no match"],
            ["match-success", "Match realizado"],
            ["matches-by-tender", "Matches por edital"]
          ]
        }
      ];

      const canSee = (item, role) => !item[2] || item[2].includes(role);
      const firstScreenFor = (role) => modules.find((m) => m.roles.includes(role))?.items.find((i) => canSee(i, role))?.[0] || "company-dashboard";

      function App() {
        const [role, setRole] = React.useState("companyAdmin");
        const [screen, setScreen] = React.useState(firstScreenFor("companyAdmin"));
        const [menuCollapsed, setMenuCollapsed] = React.useState(false);

        React.useEffect(() => {
          const allowed = modules.some((m) => m.roles.includes(role) && m.items.some((i) => i[0] === screen && canSee(i, role)));
          if (!allowed) setScreen(firstScreenFor(role));
        }, [role, screen]);

        return (
          <div className={`app ${menuCollapsed ? "menuCollapsed" : ""}`}>
            <aside className="sidebar">
              <div className="brand">
                <span className="brandMark">LH</span>
                <div><strong>LicitaHub</strong><small>Rede consultiva</small></div>
              </div>

              <button className="menuToggle" onClick={() => setMenuCollapsed(!menuCollapsed)}>
                {menuCollapsed ? "Expandir menu" : "Recolher menu"}
              </button>

              <label className="roleSwitch">
                Visualizar como
                <select value={role} onChange={(event) => setRole(event.target.value)}>
                  {Object.entries(roles).map(([value, label]) => <option key={value} value={value}>{label}</option>)}
                </select>
              </label>

              <nav>
                {modules.filter((m) => m.roles.includes(role)).map((group) => (
                  <div className="navGroup" key={group.label}>
                    <span>{group.label}</span>
                    {group.items.filter((item) => canSee(item, role)).map((item) => (
                      <a href="#" className={screen === item[0] ? "active" : ""} onClick={(event) => { event.preventDefault(); setScreen(item[0]); }} key={item[0]}>
                        {item[1]}
                      </a>
                    ))}
                  </div>
                ))}
              </nav>
            </aside>

            <main className="main">
              <header className="topbar">
                <div><span className="eyebrow">Ambiente de produto</span><h1>LicitaHub</h1></div>
                <div className="userPill"><span>Perfil ativo</span><strong>{roles[role]}</strong></div>
              </header>
              <Screen screen={screen} navigate={setScreen} />
            </main>
          </div>
        );
      }

      function Page({ label, title, children, actions }) {
        return (
          <section className="page">
            <div className="pageHeader">
              <div><span className="eyebrow">{label}</span><h2>{title}</h2><p className="pageHelp">{getPageHelp(title)}</p></div>
              {actions && <div className="actions">{actions}</div>}
            </div>
            {children}
          </section>
        );
      }

      function getPageHelp(title) {
        const help = {
          "Painel administrativo": "Acompanhe convites, empresas pendentes, editais e pontos que exigem ação da plataforma.",
          "Novo convite de empresa": "Cadastre a empresa que será convidada. CNPJ e nome fantasia identificam a empresa de forma única.",
          "Lista de convites": "Veja o andamento dos convites enviados, identifique pendências e acompanhe quem já iniciou cadastro.",
          "Análise de empresa": "Revise os dados enviados pela empresa e decida se ela entra, ajusta informações ou será recusada.",
          "Dashboard da empresa": "Resumo operacional da empresa: oportunidades, matches, comunidade e próximos passos em um só lugar.",
          "Editar perfil da empresa": "Mantenha a vitrine institucional atualizada. Essas informações aparecem na comunidade e no match.",
          "Usuários vinculados": "Gerencie quem opera pela empresa. O perfil de acesso define as permissões de cada pessoa.",
          "Cadastro do usuário vinculado": "Inclua ou edite uma pessoa da empresa, escolhendo o perfil adequado para sua função.",
          "Rede de empresas": "Acompanhe publicações, encontre empresas por tema e fortaleça a presença institucional da sua empresa.",
          "Perfil público da empresa": "Veja como a empresa aparece para a comunidade: identidade, destaques, categorias e publicações.",
          "Criar publicação": "Publique fotos, notícias, eventos, conquistas ou conteúdo técnico no perfil e na comunidade.",
          "Minhas publicações": "Gerencie o conteúdo publicado pela empresa e acompanhe o que está em rascunho ou visível.",
          "Notícias e inteligência de mercado": "Conteúdo publicado pela LicitaHub para orientar empresas sobre mercado, editais e tendências.",
          "Detalhe da notícia": "Leitura completa da notícia, com contexto e orientações úteis para a comunidade.",
          "Cadastrar notícia": "Área do administrador para publicar comunicados, notícias e análises da plataforma.",
          "Painel administrativo de editais": "Controle os editais cadastrados, seus status e oportunidades que já geraram interesse.",
          "Cadastro de edital": "Registre a oportunidade e organize os dados principais para que empresas possam avaliar com clareza.",
          "Lista de editais": "Encontre oportunidades, marque interesse e abra o detalhe completo de cada edital.",
          "Detalhe do edital": "Entenda a oportunidade, veja exigências e acesse a ficha técnica antes de decidir participar.",
          "Manifestação de interesse": "Registre a posição da empresa e indique se deseja buscar parceiros para esta licitação.",
          "Empresas interessadas no edital": "Veja empresas que também demonstraram interesse e escolha quais avaliar como possíveis parceiras.",
          "Possíveis parceiros": "Compare empresas candidatas e entenda rapidamente quem pode complementar sua participação.",
          "Avaliar candidata da licitação": "Avalie uma empresa por vez: veja o que ela oferece, o que falta e decida recusar ou dar match.",
          "Perfil da empresa no match": "Visão detalhada da candidata dentro da licitação, com oferta, necessidades e aderência.",
          "Match realizado": "Confirmação de interesse recíproco entre empresas na mesma licitação.",
          "Matches por edital": "Acompanhe matches já realizados e inicie contato pelo WhatsApp do responsável."
        };
        return help[title] || "Tela da LicitaHub para apoiar decisões empresariais com clareza e contexto.";
      }

      function Button({ children, variant = "primary", onClick }) {
        return <button className={`btn ${variant}`} onClick={onClick}>{children}</button>;
      }

      function Card({ children, className = "" }) {
        return <div className={`card ${className}`}>{children}</div>;
      }

      function Field({ label, hint, children }) {
        return <label className="field"><span>{label}</span>{children}{hint && <small>{hint}</small>}</label>;
      }

      function FormGrid({ children }) {
        return <div className="formGrid">{children}</div>;
      }

      function Stats({ items }) {
        return <div className="stats">{items.map(([label, value]) => <Card className="stat" key={label}><strong>{value}</strong><span>{label}</span></Card>)}</div>;
      }

      function Table({ columns, rows }) {
        return (
          <div className="tableWrap">
            <table>
              <thead><tr>{columns.map((column) => <th key={column}>{column}</th>)}</tr></thead>
              <tbody>{rows.map((row, index) => <tr key={index}>{row.map((cell, i) => <td key={i}>{cell}</td>)}</tr>)}</tbody>
            </table>
          </div>
        );
      }

      function Screen({ screen, navigate }) {
        const map = {
          "admin-dashboard": <AdminDashboard />,
          "invite-new": <InviteNew />,
          "invite-list": <InviteList />,
          "company-review": <CompanyReview />,
          "company-dashboard": <CompanyDashboard />,
          "company-profile-edit": <CompanyProfileEdit />,
          "company-users": <CompanyUsers />,
          "company-user-profile": <CompanyUserProfile />,
          "community-home": <CommunityHome />,
          "company-public-profile": <CompanyPublicProfile />,
          "publication-new": <PublicationNew />,
          "publication-list": <PublicationList />,
          "radar-home": <RadarHome navigate={navigate} />,
          "radar-detail": <RadarDetail />,
          "radar-new": <RadarNew />,
          "tender-admin": <TenderAdmin />,
          "tender-new": <TenderNew />,
          "tender-list": <TenderList />,
          "tender-detail": <TenderDetail />,
          "tender-interest": <TenderInterest navigate={navigate} />,
          "tender-interest-list": <TenderInterestList navigate={navigate} />,
          "match-partners": <MatchPartners />,
          "match-tinder": <MatchTinder navigate={navigate} />,
          "match-profile": <MatchProfile />,
          "match-success": <MatchSuccess />,
          "matches-by-tender": <MatchesByTender />
        };
        return map[screen] || <CompanyDashboard />;
      }

      function AdminDashboard() {
        return <Page label="Administração" title="Painel administrativo"><Stats items={[["Convites", "12"], ["Empresas pendentes", "4"], ["Empresas ativas", "28"], ["Editais abertos", "9"]]} /><div className="grid two"><Card><h3>Entrada de empresas</h3><p>Convites, aprovações e bloqueios.</p><Button>Novo convite</Button></Card><Card><h3>Editais</h3><p>Cadastro e acompanhamento das oportunidades.</p><Button variant="secondary">Cadastrar edital</Button></Card></div></Page>;
      }

      function InviteNew() {
        return <Page label="Convites" title="Novo convite de empresa" actions={<Button>Enviar convite</Button>}><FormGrid><Field label="Nome fantasia" hint="Obrigatório. Único."><input placeholder="Engenvale Consultoria" /></Field><Field label="CNPJ" hint="Obrigatório. Único."><input placeholder="00.000.000/0000-00" /></Field><Field label="Contato principal"><input placeholder="Nome completo" /></Field><Field label="E-mail" hint="Pode repetir."><input type="email" placeholder="contato@empresa.com.br" /></Field><Field label="Telefone"><input placeholder="(00) 00000-0000" /></Field><Field label="Estado"><select><option>Selecione</option><option>SP</option><option>MG</option></select></Field></FormGrid><Field label="Observação interna"><textarea placeholder="Visível apenas para administradores" /></Field></Page>;
      }

      function InviteList() {
        return <Page label="Convites" title="Lista de convites" actions={<Button>Novo convite</Button>}><Table columns={["Empresa", "CNPJ", "Contato", "E-mail", "Status"]} rows={[["Engenvale Consultoria", "12.345.678/0001-90", "Marina Costa", "marina@engenvale.com.br", "Enviado"], ["Plano Sul Engenharia", "22.222.222/0001-22", "Carlos Lima", "contato@planosul.com.br", "Aguardando aprovação"]]} /></Page>;
      }

      function CompanyReview() {
        return <Page label="Administração" title="Análise de empresa"><FormGrid><Field label="Empresa"><input value="Plano Sul Engenharia" readOnly /></Field><Field label="CNPJ"><input value="22.222.222/0001-22" readOnly /></Field><Field label="Status"><input value="Aguardando aprovação" readOnly /></Field></FormGrid><Field label="Ajuste solicitado"><textarea placeholder="Informe o que precisa ser corrigido" /></Field><div className="actions"><Button>Aprovar</Button><Button variant="secondary">Solicitar ajuste</Button><Button variant="danger">Recusar</Button></div></Page>;
      }

      function CompanyDashboard() {
        return (
          <Page label="Empresa" title="Dashboard da empresa" actions={<><Button>Ver editais</Button><Button variant="secondary">Atualizar perfil</Button></>}>
            <div className="dashboardHero">
              <div>
                <span className="eyebrow">Engenvale Consultoria</span>
                <h3>Boa tarde, Marina. Há 3 oportunidades com alta aderência e 2 conversas de parceria aguardando avanço.</h3>
                <p>Use esta visão para priorizar editais, acompanhar matches e manter a presença da empresa ativa na comunidade.</p>
              </div>
              <div className="profileScore">
                <strong>82%</strong>
                <span>perfil completo</span>
                <div className="progress"><i style={{width: "82%"}}></i></div>
              </div>
            </div>

            <Stats items={[["Editais compatíveis", "9"], ["Alta prioridade", "3"], ["Matches abertos", "2"], ["Publicações recentes", "14"]]} />

            <div className="dashboardGrid">
              <Card>
                <div className="cardHeader">
                  <h3>Oportunidades prioritárias</h3>
                  <span className="badge">Editais</span>
                </div>
                <div className="priorityList">
                  <PriorityItem title="CP 004/2026 - Projetos de saneamento" meta="MG | R$ 2,4 mi | abertura em 20/08/2026" score="Alta aderência" />
                  <PriorityItem title="TP 012/2026 - Supervisão rodoviária" meta="PR | R$ 5,8 mi | em avaliação" score="Média aderência" />
                  <PriorityItem title="Chamamento técnico socioambiental" meta="BA | valor não informado | novo" score="Complementar" />
                </div>
              </Card>

              <Card>
                <div className="cardHeader">
                  <h3>Matches e conversas</h3>
                  <span className="badge">Consórcios</span>
                </div>
                <div className="priorityList">
                  <PriorityItem title="GeoArq Projetos" meta="Match na CP 004/2026 | aguardando divisão de escopo" score="Aberto" />
                  <PriorityItem title="SocialTec Consultoria" meta="Projetos sociais | possível complemento técnico" score="Em análise" />
                </div>
              </Card>

              <Card>
                <div className="cardHeader">
                  <h3>Comunidade</h3>
                  <span className="badge">Rede</span>
                </div>
                <div className="activityList">
                  <p><strong>GeoArq Projetos</strong> publicou atualização sobre estudos arqueológicos preventivos.</p>
                  <p><strong>Plano Sul Engenharia</strong> compartilhou certificação de supervisão ambiental.</p>
                  <p><strong>SocialTec</strong> adicionou experiência em reassentamento e comunicação social.</p>
                </div>
              </Card>

              <Card>
                <div className="cardHeader">
                  <h3>Ações recomendadas</h3>
                  <span className="badge">Próximos passos</span>
                </div>
                <div className="actionStack">
                  <button className="actionRow">Completar experiências técnicas públicas</button>
                  <button className="actionRow">Registrar interesse no edital CP 004/2026</button>
                  <button className="actionRow">Responder conversa com GeoArq Projetos</button>
                  <button className="actionRow">Publicar notícia institucional da semana</button>
                </div>
              </Card>
            </div>
          </Page>
        );
      }

      function PriorityItem({ title, meta, score }) {
        return (
          <div className="priorityItem">
            <div>
              <strong>{title}</strong>
              <span>{meta}</span>
            </div>
            <em>{score}</em>
          </div>
        );
      }

      function CompanyProfileEdit() {
        return (
          <Page label="Empresa" title="Editar perfil da empresa" actions={<Button>Salvar perfil</Button>}>
            <div className="profileEditGrid">
              <Card>
                <h3>Identidade visual</h3>
                <div className="logoPreview">EC</div>
                <Field label="Logomarca da empresa" hint="PNG, JPG ou SVG. Recomenda-se imagem quadrada. Usada no perfil público, comunidade e avaliação candidata."><input type="file" accept="image/png,image/jpeg,image/svg+xml" /></Field>
              </Card>
              <div>
                <FormGrid><Field label="Nome fantasia"><input value="Engenvale Consultoria" readOnly /></Field><Field label="CNPJ"><input value="12.345.678/0001-90" readOnly /></Field><Field label="Site"><input placeholder="https://www.empresa.com.br" /></Field><Field label="Porte"><select><option>Média</option><option>Pequena</option><option>Grande</option></select></Field></FormGrid>
                <Field label="Descrição institucional"><textarea placeholder="Resumo profissional da atuação da empresa" /></Field>
              </div>
            </div>
            <h3>Áreas técnicas</h3>
            <div className="chips">{["Saneamento", "Supervisão ambiental", "Geotecnia", "BIM"].map((x) => <span key={x}>{x}</span>)}</div>
          </Page>
        );
      }

      function CompanyUsers() {
        return <Page label="Empresa" title="Usuários vinculados" actions={<Button>Adicionar usuário</Button>}><Card className="notice"><strong>Permissões por perfil</strong><p>As permissões não são marcadas individualmente. Cada usuário recebe um perfil de acesso, e o perfil define o que ele pode fazer.</p></Card><Table columns={["Nome", "E-mail", "Perfil de acesso", "Permissões do perfil", "Status"]} rows={[["Marina Costa", "marina@engenvale.com.br", "Administrador da empresa", "Gerencia perfil, usuários, publicações, editais, match e mensagens", "Ativo"], ["Renato Alves", "renato@engenvale.com.br", "Técnico", "Visualiza editais e apoia análise técnica", "Ativo"], ["Paula Martins", "paula@engenvale.com.br", "Comercial", "Publica, manifesta interesse, participa do match e responde mensagens", "Convite pendente"]]} /></Page>;
      }

      function CompanyUserProfile() {
        return (
          <Page label="Empresa" title="Cadastro do usuário vinculado" actions={<Button>Salvar usuário</Button>}>
            <FormGrid>
              <Field label="Nome completo"><input placeholder="Nome do usuário" /></Field>
              <Field label="E-mail"><input type="email" placeholder="usuario@empresa.com.br" /></Field>
              <Field label="Telefone"><input placeholder="(00) 00000-0000" /></Field>
              <Field label="Cargo ou função"><input placeholder="Ex.: Coordenador técnico" /></Field>
              <Field label="Perfil de acesso"><select><option>Administrador da empresa</option><option>Comercial / Relacionamento</option><option>Técnico</option><option>Leitor</option></select></Field>
              <Field label="Status"><select><option>Convite pendente</option><option>Ativo</option><option>Bloqueado</option><option>Inativo</option></select></Field>
            </FormGrid>
            <Card>
              <h3>Permissões aplicadas pelo perfil</h3>
              <p>Administrador da empresa: pode editar perfil, gerenciar usuários, criar publicações, manifestar interesse em editais, participar do match e responder mensagens.</p>
            </Card>
            <Field label="Observação interna"><textarea placeholder="Anotação visível apenas para administradores da empresa" /></Field>
          </Page>
        );
      }

      function CommunityHome() {
        return (
          <Page label="Comunidade" title="Rede de empresas" actions={<Button variant="secondary">Criar publicação</Button>}>
            <div className="communityToolbar">
              <div className="communitySearch">
                <span>Buscar</span>
                <input placeholder="Empresa, especialidade, notícia ou região" />
              </div>
              <select>
                <option>Brasil inteiro</option>
                <option>SP</option>
                <option>MG</option>
                <option>PR</option>
              </select>
            </div>

            <div className="communityLayout">
              <aside className="communityRail">
                <Card className="companyMiniProfile">
                  <span className="avatar">E</span>
                  <strong>Engenvale Consultoria</strong>
                  <p>Perfil 82% completo</p>
                  <div className="progress"><i style={{width: "82%"}}></i></div>
                </Card>
                <Card>
                  <h3>Categorias</h3>
                  <div className="compactTags">
                    {["Equipe", "Notícias", "Atividades", "Eventos", "Conquistas", "Técnico", "Destaques"].map((item) => <button key={item}>{item}</button>)}
                  </div>
                </Card>
              </aside>

              <section className="communityFeed">
                <div className="composer modern">
                  <span className="avatar">E</span>
                  <div>
                    <button className="composerInput">Compartilhar notícia, foto, evento ou conquista...</button>
                    <div className="composerActions">
                      <button>Imagem</button>
                      <button>Evento</button>
                      <button>Conteúdo técnico</button>
                    </div>
                  </div>
                </div>

                <div className="categoryTabs compact">
                  {["Todos", "Equipe comercial", "Notícias", "Atividades", "Eventos", "Conquistas", "Conteúdo técnico", "Destaques"].map((item) => <button key={item}>{item}</button>)}
                </div>

                <div className="socialFeed">
                  <PostCard category="Notícias" company="GeoArq Projetos" title="Estudos arqueológicos preventivos em nova frente de infraestrutura" />
                  <PostCard category="Conquistas" company="Plano Sul Engenharia" title="Certificação técnica da equipe de supervisão ambiental" />
                  <PostCard category="Equipe comercial" company="Engenvale Consultoria" title="Equipe comercial reunida para planejamento de oportunidades públicas" />
                </div>
              </section>

              <aside className="communityAside">
                <Card>
                  <h3>Empresas sugeridas</h3>
                  <div className="suggestList">
                    <CompanySuggestion name="SocialTec" area="Projetos sociais" />
                    <CompanySuggestion name="GeoArq" area="Arqueologia e meio ambiente" />
                    <CompanySuggestion name="Plano Sul" area="Supervisão rodoviária" />
                  </div>
                </Card>
                <Card>
                  <h3>Destaque LicitaHub</h3>
                  <p>Empresas com perfil completo tendem a aparecer melhor em matches e recomendações.</p>
                </Card>
              </aside>
            </div>
          </Page>
        );
      }

      function CompanySuggestion({ name, area }) {
        return (
          <div className="suggestItem">
            <span className="avatar">{name[0]}</span>
            <div>
              <strong>{name}</strong>
              <small>{area}</small>
            </div>
            <button>Ver</button>
          </div>
        );
      }

      function PostCard({ category, company, title }) {
        return (
          <Card className="postCard">
            <div className="postHead">
              <span className="avatar">{company[0]}</span>
              <div><strong>{company}</strong><small>{category}</small></div>
            </div>
            <div className="postImage">{category}</div>
            <h3>{title}</h3>
            <p>Texto de exemplo da publicação com contexto empresarial, técnico e institucional.</p>
